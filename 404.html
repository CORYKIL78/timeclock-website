<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portal Redirect</title>
</head>
<body>
  <script>
    // GitHub Pages 404.html router
    // This file is served for all non-existent paths, allowing us to route to the correct HTML
    
    (function() {
      const pathname = window.location.pathname;
      let target = '/index.html'; // Default fallback
      
      if (pathname === '/' || pathname === '') {
        target = '/portal-directory.html';
      } 
      else if (pathname === '/admin' || pathname === '/admin/' || pathname.startsWith('/admin/')) {
        target = '/admin/backup.html';
      } 
      else if (pathname.startsWith('/cirklestaff/ocportal')) {
        target = '/admin/backup.html';
      } 
      else if (pathname.startsWith('/cirklestaff/')) {
        target = '/index.html';
      } 
      else if (pathname.startsWith('/clients')) {
        target = '/maintenance.html';
      } 
      else if (pathname.startsWith('/departments')) {
        target = '/maintenance.html';
      }
      else if (pathname.startsWith('/adminportal')) {
        target = '/admin/backup.html';
      }
      else if (pathname.startsWith('/financetools')) {
        target = '/maintenance.html';
      }
      
      // Redirect to the appropriate file while preserving the original pathname
      // so client-side routing (history API) can use it
      window.location.replace(target + '?redirect=' + encodeURIComponent(pathname));
    })();
  </script>
</body>
</html>
