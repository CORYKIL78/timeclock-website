<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portal Redirect</title>
</head>
<body>
  <script>
    // GitHub Pages 404 fallback router for pretty URL paths.
    (function() {
      const pathname = window.location.pathname || '/';
      const search = window.location.search || '';

      try {
        sessionStorage.setItem('portal_pending_path', pathname);
      } catch (e) {
        // Ignore storage failures.
      }

      let target = '/index.html';

      if (pathname.startsWith('/portal/backend/adminhub')) {
        target = '/portal/backend/adminhub/index.html';
      } else if (pathname.startsWith('/clients/cdgassociates')) {
        target = '/clients/cdgassociates/index.html';
      } else if (pathname.startsWith('/cirklestaff/ocportal')) {
        target = '/cirklestaff/ocportal/index.html';
      } else if (pathname.startsWith('/cirklestaff/staffportal')) {
        target = '/cirklestaff/index.html';
      } else if (pathname === '/cirklestaff' || pathname === '/cirklestaff/') {
        target = '/cirklestaff/index.html';
      } else if (pathname.startsWith('/clients/') || pathname.startsWith('/departments/')) {
        target = '/maintenance.html';
      } else if (pathname === '/admin' || pathname === '/admin/' || pathname.startsWith('/admin/')) {
        target = '/admin/backup.html';
      } else if (pathname.startsWith('/adminportal')) {
        target = '/admin/backup.html';
      }

      if (target.endsWith('/index.html')) {
        window.location.replace(`${target}${search}`);
      } else {
        window.location.replace(target);
      }
    })();
  </script>
</body>
</html>
