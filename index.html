<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Directory - Cirkle</title>
    <link rel="icon" href="Portal Logo.webp" type="image/webp">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #04050a;
            --bg-panel: rgba(10, 14, 26, 0.76);
            --text: #f8fafc;
            --text-muted: #cbd5e1;
            --accent: #6366f1;
            --accent-light: #818cf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0c0a1a 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Star field background */
        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 
                0 0 60px 2px rgba(99, 102, 241, 0.2),
                0 0 100px 3px rgba(139, 92, 246, 0.15);
            animation: drift 150s linear infinite;
        }

        .stars:nth-child(1) {
            width: 3px;
            height: 3px;
            opacity: 0.8;
            animation: drift 200s linear infinite, twinkle 3s ease-in-out infinite;
        }

        .stars:nth-child(2) {
            width: 1.5px;
            height: 1.5px;
            opacity: 0.6;
            animation: drift 250s linear infinite, twinkle 4s ease-in-out infinite;
        }

        .stars:nth-child(3) {
            width: 1px;
            height: 1px;
            opacity: 0.4;
            animation: drift 300s linear infinite, twinkle 5s ease-in-out infinite;
        }

        @keyframes drift {
            from { transform: translateX(0) translateY(0); }
            to { transform: translateX(-100px) translateY(-100px); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Splash screen */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0c0a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOut 2.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }

        .splash-content {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .orbital-rings {
            position: absolute;
            inset: 0;
        }

        .ring {
            position: absolute;
            inset: 0;
            border: 2px solid;
            border-radius: 50%;
            animation: spin linear infinite;
        }

        .ring:nth-child(1) {
            border-color: rgba(99, 102, 241, 0.6);
            animation-duration: 3s;
            transform: rotate(0deg);
        }

        .ring:nth-child(2) {
            border-color: rgba(139, 92, 246, 0.4);
            animation-duration: 2.5s;
            transform: rotate(45deg);
            inset: 10px;
        }

        .ring:nth-child(3) {
            border-color: rgba(168, 85, 247, 0.3);
            animation-duration: 2s;
            transform: rotate(-30deg);
            inset: 20px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            animation: float 2s ease-in-out infinite;
        }

        .logo-image img {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.6));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .splash-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 20px;
            font-size: 12px;
            color: #60a5fa;
            margin-top: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .brand-section {
            text-align: center;
            margin-bottom: 80px;
            animation: slideUp 0.8s ease-out 2s backwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 30px;
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.5));
            animation: float 2s ease-in-out infinite;
        }

        .heading {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            color: #93c5fd;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .sentinel-badge {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(99, 102, 241, 0.1) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            font-size: 13px;
            color: #60a5fa;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Portal sections grid */
        .portals-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            width: 100%;
            max-width: 900px;
            animation: slideUp 0.8s ease-out 2.2s backwards;
        }

        .portal-section {
            background: var(--bg-panel);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .portal-section:hover {
            border-color: rgba(99, 102, 241, 0.5);
            background: var(--bg-panel);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.1);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .portal-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .portal-button {
            padding: 12px 16px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.05) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: block;
            text-align: left;
        }

        .portal-button:hover {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.15) 100%);
            border-color: rgba(99, 102, 241, 0.6);
            transform: translateX(4px);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.15);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .portals-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .heading {
                font-size: 32px;
            }

            .subtitle {
                font-size: 16px;
            }

            .brand-section {
                margin-bottom: 40px;
            }

            .container {
                padding: 40px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Star field background -->
    <div class="star-field" id="starField"></div>

    <!-- Splash screen -->
    <div class="splash-overlay">
        <div class="splash-content">
            <div class="logo-container">
                <div class="orbital-rings">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                </div>
                <div class="logo-image">
                    <img src="Portal Logo.webp" alt="Cirkle Portal">
                </div>
            </div>
            <div class="splash-badge">SENTINEL SECURED</div>
        </div>
    </div>

    <!-- Main content -->
    <div class="container">
        <div class="brand-section">
            <img src="Portal Logo.webp" alt="Cirkle Portal" class="logo">
            <h1 class="heading">Welcome to Portal Directory</h1>
            <p class="subtitle">Where would you like to go?</p>
            <div class="sentinel-badge">🔐 SENTINEL SECURED NETWORK</div>
        </div>

        <div class="portals-grid">
            <!-- Clients Section -->
            <div class="portal-section">
                <div class="section-title">
                    <div class="section-icon">👥</div>
                    Clients
                </div>
                <div class="portal-buttons">
                    <a href="/clients/cdgassociates/dashboard" class="portal-button">CDG Associates</a>
                    <a href="/clients/marketing/dashboard" class="portal-button">Marketing Clients</a>
                    <a href="/clients/resellers/dashboard" class="portal-button">Reseller Clients</a>
                    <a href="/clients/bots/dashboard" class="portal-button">Bot Hosting Clients</a>
                </div>
            </div>

            <!-- Departments Section -->
            <div class="portal-section">
                <div class="section-title">
                    <div class="section-icon">🏢</div>
                    Departments
                </div>
                <div class="portal-buttons">
                    <a href="/departments/customerrelations/dashboard" class="portal-button">Customer Relations</a>
                    <a href="/departments/finance/dashboard" class="portal-button">Finance</a>
                    <a href="/departments/development/dashboard" class="portal-button">Development</a>
                </div>
            </div>

            <!-- Cirkle Staff Section -->
            <div class="portal-section">
                <div class="section-title">
                    <div class="section-icon">⚙️</div>
                    Cirkle Staff
                </div>
                <div class="portal-buttons">
                    <a href="/cirklestaff/staffportal/dashboard" class="portal-button">Staff Portal</a>
                    <a href="/cirklestaff/ocportal/dashboard" class="portal-button">OC Portal</a>
                    <a href="/portal/backend/adminhub/dashboard" class="portal-button">Portal Complete Admin</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TRACK_ENDPOINT = 'https://timeclock-backend.marcusray.workers.dev/api/portal/track-view';

        function trackPortalEvent(action, target = '') {
            fetch(TRACK_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                keepalive: true,
                body: JSON.stringify({
                    action,
                    target,
                    path: window.location.pathname
                })
            }).catch(() => null);
        }

        // Generate star field
        const starField = document.getElementById('starField');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'stars';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            starField.appendChild(star);
        }

        trackPortalEvent('view');
        document.querySelectorAll('.portal-button').forEach(btn => {
            btn.addEventListener('click', () => {
                trackPortalEvent('click', btn.getAttribute('href') || 'unknown');
            });
        });
    </script>
</body>
</html>
