<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Maintenance</title>
    <link rel="icon" href="Portal Logo.webp" type="image/webp">
    <style>
        :root {
            --bg: #05070d;
            --panel: rgba(14, 18, 31, 0.9);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #6366f1;
            --accent2: #8b5cf6;
            --border: rgba(99, 102, 241, 0.28);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            display: grid;
            place-items: center;
            background:
                radial-gradient(900px 400px at 20% -10%, rgba(99, 102, 241, 0.2), transparent),
                radial-gradient(700px 360px at 90% 110%, rgba(139, 92, 246, 0.2), transparent),
                #05070d;
            padding: 20px;
        }
        .panel {
            width: min(680px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        }
        .logo { width: 74px; height: 74px; object-fit: contain; margin-bottom: 12px; }
        .badge {
            display: inline-block;
            font-size: 12px;
            letter-spacing: 0.08em;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(99, 102, 241, 0.45);
            color: #c7d2fe;
            margin-bottom: 16px;
        }
        h1 { font-size: 32px; margin-bottom: 8px; }
        .subtitle { color: var(--muted); margin-bottom: 12px; }
        .route { font-weight: 600; color: #c4b5fd; margin-bottom: 16px; }
        .message { color: var(--muted); line-height: 1.6; margin-bottom: 22px; }
        .back-btn {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            padding: 11px 18px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="panel">
        <img src="logotransparent.png" alt="Portal Logo" class="logo">
        <div class="badge">SECURED BY SENTINEL</div>
        <h1>Currently In Maintenance</h1>
        <p class="subtitle">This area is temporarily unavailable.</p>
        <p class="route" id="routeLabel">Section: Portal</p>
        <p class="message">We're working on updates for this section. Please return to the Portal Directory and try again later.</p>
        <a class="back-btn" href="/">Return To Portal Directory</a>
    </div>

    <script>
        (function () {
            let originalPath = window.location.pathname;
            try {
                const pending = sessionStorage.getItem('portal_pending_path');
                if (pending) {
                    originalPath = pending;
                    sessionStorage.removeItem('portal_pending_path');
                    history.replaceState({}, '', pending);
                }
            } catch (e) {
                // Ignore storage/history errors.
            }

            const routeLabel = document.getElementById('routeLabel');
            if (originalPath.startsWith('/clients/')) {
                routeLabel.textContent = 'Section: Clients';
            } else if (originalPath.startsWith('/departments/')) {
                routeLabel.textContent = 'Section: Departments';
            }
        })();
    </script>
</body>
</html>
